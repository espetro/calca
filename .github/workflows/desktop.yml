name: Desktop Build
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run typecheck
      - run: bun test

  build-desktop:
    needs: test
    runs-on: macos-latest
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run build:desktop
      - uses: actions/upload-artifact@v4
        with:
          name: calca-desktop
          path: platforms/desktop/build/

  release:
    needs: build-desktop
    runs-on: macos-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run build:desktop
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: platforms/desktop/build/*.dmg
          generate_release_notes: true